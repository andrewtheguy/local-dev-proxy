name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Determine and validate version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          root = pathlib.Path(".")
          pyproject = (root / "pyproject.toml").read_text()

          pyproject_match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)

          if pyproject_match is None:
            raise SystemExit("Could not determine version from pyproject.toml")

          pyproject_version = pyproject_match.group(1)
          release_tag = f"v{pyproject_version}"

          # Check if tag already exists
          result = subprocess.run(
              ["gh", "api", f"repos/{os.environ['GH_REPO']}/git/ref/tags/{release_tag}"],
              capture_output=True,
          )
          if result.returncode == 0:
            raise SystemExit(f"Tag {release_tag} already exists. Bump the version before releasing.")

          print(f"Release tag: {release_tag}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tag={release_tag}\n")
          PY

  build-wheel:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Pure-Python project: one universal (py3-none-any) wheel serves every OS/arch.
      - name: Build wheel
        run: uv build --wheel -o dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-python-wheel
          path: dist/*.whl
          if-no-files-found: error

  build-macos-arm64-app:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Verify ARM64 runner
        run: test "$(uname -m)" = "arm64"

      - name: Create macOS app bundle
        run: uvx --from briefcase==0.4.4 briefcase create macOS app --no-input

      - name: Build macOS app bundle
        run: uvx --from briefcase==0.4.4 briefcase build macOS app --no-input

      - name: Package macOS app as unsigned DMG
        # Briefcase's package command requires either an Apple distribution
        # certificate or an ad-hoc signature that it marks as non-distributable.
        # The build step already produced the .app, so wrap it directly in a DMG.
        run: |
          mkdir -p dist/dmg-root
          ditto \
            "build/local-dev-proxy/macos/app/Local Dev Proxy.app" \
            "dist/dmg-root/Local Dev Proxy.app"
          ln -s /Applications "dist/dmg-root/Applications"
          hdiutil create \
            -volname "Local Dev Proxy" \
            -srcfolder dist/dmg-root \
            -format UDZO \
            -ov \
            dist/local-dev-proxy-macos-arm64.dmg

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-app
          path: dist/*.dmg
          if-no-files-found: error

  build-windows-msi:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Create Windows app
        run: uvx --from briefcase==0.4.4 briefcase create windows app --no-input

      - name: Build Windows app
        run: uvx --from briefcase==0.4.4 briefcase build windows app --no-input

      - name: Package Windows app as MSI
        run: >-
          uvx --from briefcase==0.4.4 briefcase package windows app
          --packaging-format msi
          --adhoc-sign
          --no-input

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-msi
          path: dist/*.msi
          if-no-files-found: error

  create-release:
    needs: [prepare, build-wheel, build-macos-arm64-app, build-windows-msi]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          for extension in whl dmg msi; do
            if ! find release-assets -type f -name "*.${extension}" -print -quit | grep -q .; then
              echo "No .${extension} release asset found under release-assets" >&2
              exit 1
            fi
          done

          mapfile -d '' assets < <(
            find release-assets -type f \
              \( -name '*.whl' -o -name '*.dmg' -o -name '*.msi' \) \
              -print0 | sort -z
          )

          prerelease_flag=""
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            $prerelease_flag \
            "${assets[@]}"

  deploy-pages:
    if: github.ref_name == 'main'
    needs: create-release
    uses: ./.github/workflows/deploy-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
