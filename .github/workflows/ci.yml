name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    # The app is cross-platform (PySide6 window + system tray), so lint, type-check,
    # and tests run on all three desktop OSes. The suite includes the
    # tests/test_gui_e2e.py GUI end-to-end coverage alongside the proxy/config/routes
    # logic, all of which must pass everywhere.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint with ruff
        run: uv run ruff check

      - name: Type check with basedpyright
        run: uv run basedpyright

      - name: Test with pytest
        run: uv run pytest
