[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "local-dev-proxy"
version = "0.1.0"
description = "Local dev orchestration with built-in reverse proxy and zellij services"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12.0",
  "aiohttp>=3.9.0",
  "rumps>=0.4.0",
]

[project.scripts]
local-dev-proxy = "local_dev_proxy.cli:app"

[dependency-groups]
dev = [
  "pytest>=8.0.0",
  "pytest-aiohttp>=1.0.0",
]

[tool.uv]
default-groups = ["dev"]

[tool.hatch.build.targets.wheel]
packages = ["src/local_dev_proxy"]
# Ship bundled runtime resources (tray icon + sample config) inside the wheel.
artifacts = [
  "src/local_dev_proxy/assets/*",
  "src/local_dev_proxy/services.toml.sample",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"
