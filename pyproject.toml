[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "local-dev-proxy"
version = "0.0.2"
description = "Local dev orchestration with built-in reverse proxy and zellij services"
authors = [{ name = "Andrew Chen", email = "hello@andrewtheguy.com" }]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "typer>=0.12.0",
  "aiohttp>=3.9.0",
  "filelock>=3.31.0",
  # Cross-platform GUI + system tray (SystemTrayIcon is new in 1.17, currently
  # only in the beta binding). Ships its own per-OS binary wheel.
  "slint==1.17.1b2",
]

[project.scripts]
local-dev-proxy = "local_dev_proxy.cli:app"

[dependency-groups]
dev = [
  "pytest>=8.0.0",
  "pytest-aiohttp>=1.0.0",
  "ruff>=0.14.6",
  "basedpyright>=1.29.0",
]

[tool.uv]
default-groups = ["dev"]

[tool.hatch.build.targets.wheel]
packages = ["src/local_dev_proxy"]
# Ship bundled runtime resources (icons, Slint UI, sample config) inside the wheel.
artifacts = [
  "src/local_dev_proxy/assets/*",
  "src/local_dev_proxy/ui/*.slint",
  "src/local_dev_proxy/services.toml.sample",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.pyright]
# gui.py wraps Slint's dynamically generated component classes, which have no
# type stubs, so it is excluded from static checking.
exclude = [
    ".venv", "build", "dist", ".git", "tests", "tmp",
    "src/local_dev_proxy/gui.py",
]
reportUnknownParameterType = true
reportUninitializedInstanceVariable = true
# Disable basedpyright-specific strict rules
reportMissingTypeStubs = false
reportExplicitAny = false
reportAny = false
reportUnannotatedClassAttribute = false
reportUnknownMemberType = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportImplicitStringConcatenation = false
reportMissingImports = true
reportMissingModuleSource = false
reportUnusedCallResult = false
reportImplicitOverride = false
# typer's API relies on function calls (Option/Argument) as parameter defaults.
reportCallInDefaultInitializer = false
