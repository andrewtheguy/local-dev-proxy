[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "local-dev-proxy"
version = "0.1.0"
description = "Local dev orchestration for Caddy and zellij services"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12.0",
  "httpx>=0.27.0",
  "rumps>=0.4.0",
]

[project.scripts]
local-dev-proxy = "local_dev_proxy.cli:app"

[dependency-groups]
dev = [
  "pytest>=8.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/local_dev_proxy"]

[tool.pytest.ini_options]
pythonpath = ["src"]
